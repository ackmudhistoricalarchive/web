# nginx configuration for ackmud.com and aha.ackmud.com
#
# Provides:
#   - HTTP → HTTPS redirect (port 80) for both domains
#   - ACME challenge webroot for certbot (port 80), shared by both the web
#     server and acktng so either can run: certbot certonly --webroot \
#     --webroot-path /var/www/certbot -d ackmud.com -d aha.ackmud.com
#   - HTTPS reverse proxy to Python web server (port 443) for both domains
#     (the Python server uses the Host header to distinguish sites)
#   - Secure WebSocket (WSS) proxies for MUD game servers
#
# This file supersedes acktng/scripts/setup-wss-proxy.sh.  Do not install
# both; use this one and remove /etc/nginx/conf.d/ackmud-wss.conf if present.
#
# Install:
#   sudo cp nginx/ackmud.conf /etc/nginx/sites-available/ackmud.conf
#   sudo ln -sf /etc/nginx/sites-available/ackmud.conf /etc/nginx/sites-enabled/ackmud.conf
#   sudo rm -f /etc/nginx/conf.d/ackmud-wss.conf   # remove acktng's old config
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL certificates:
#   certbot certonly --webroot --webroot-path /var/www/certbot \
#     -d ackmud.com -d www.ackmud.com -d aha.ackmud.com

# ── HTTP: redirect + ACME challenge ───────────────────────────────────────────
server {
    listen 80;
    server_name ackmud.com www.ackmud.com aha.ackmud.com;

    # Serve Let's Encrypt ACME challenge files (used by certbot --webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: AHA: World of Lore (ackmud.com) ────────────────────────────────────
server {
    listen 443 ssl;
    server_name ackmud.com www.ackmud.com;

    ssl_certificate     /etc/letsencrypt/live/ackmud.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ackmud.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass              http://127.0.0.1:8080;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
    }
}

# ── HTTPS: ACKmud Historical Archive (aha.ackmud.com) ─────────────────────────
server {
    listen 443 ssl;
    server_name aha.ackmud.com;

    ssl_certificate     /etc/letsencrypt/live/ackmud.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ackmud.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass              http://127.0.0.1:8080;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
    }
}

# ── WSS proxy: ACK!TNG (port 18890) ───────────────────────────────────────────
# Game servers run on the acktng host (192.168.1.103); nginx proxies WSS from
# the web container (192.168.1.113) to the game servers over the LAN.
server {
    listen 18890 ssl;
    server_name ackmud.com;

    ssl_certificate     /etc/letsencrypt/live/ackmud.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ackmud.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass          http://192.168.1.103:18890;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}

