<!doctype html><html lang="en"><head>
<meta charset="utf-8">
<title>__TITLE__</title>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
:root{
  color-scheme:dark;
  --bg:#07090f;
  --bg-soft:#0d1424;
  --bg-card:#111827;
  --bg-card-hover:#151e30;
  --line:#1f2d4a;
  --line-bright:#2d4270;
  --text:#e8eeff;
  --muted:#8899cc;
  --muted-dim:#5a6e99;
  --accent:#5b9cf6;
  --accent-bright:#7db8ff;
  --accent-glow:rgba(91,156,246,.18);
  --accent-dim:rgba(91,156,246,.08);
  --radius-sm:8px;
  --radius:12px;
  --radius-lg:18px;
  --shadow:0 4px 24px rgba(0,0,0,.45);
  --shadow-lg:0 8px 48px rgba(0,0,0,.6);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%,rgba(59,96,180,.22),transparent),
    radial-gradient(ellipse 60% 40% at 80% 90%,rgba(30,60,130,.12),transparent);
  color:var(--text);
  max-width:1100px;
  margin:0 auto;
  padding:1.5rem 1rem 3rem;
  line-height:1.65;
  min-height:100vh;
}

/* ── Header ── */
.site-brand{
  display:flex;
  align-items:center;
  gap:1.25rem;
  margin-bottom:1.25rem;
  padding:.9rem 1.25rem;
  background:rgba(13,20,36,.85);
  border:1px solid var(--line);
  border-radius:var(--radius-lg);
  backdrop-filter:blur(12px);
  box-shadow:var(--shadow);
}
.site-brand img{width:min(320px,100%);height:auto;filter:drop-shadow(0 0 18px rgba(91,156,246,.45)) saturate(0.65) brightness(1.05);}
.site-brand p{color:var(--muted);font-size:.9rem;letter-spacing:.02em;}

/* ── Nav ── */
nav{
  display:flex;
  flex-wrap:wrap;
  gap:.5rem;
  margin-bottom:1.25rem;
  padding:.75rem 1rem;
  background:rgba(13,20,36,.7);
  border:1px solid var(--line);
  border-radius:var(--radius-lg);
  backdrop-filter:blur(8px);
}
nav a{
  padding:.4rem .85rem;
  background:var(--accent-dim);
  border:1px solid var(--line);
  border-radius:999px;
  text-decoration:none;
  color:var(--text);
  font-weight:500;
  font-size:.88rem;
  letter-spacing:.025em;
  transition:background .18s,border-color .18s,color .18s,box-shadow .18s;
}
nav a:hover{
  background:rgba(91,156,246,.2);
  border-color:var(--line-bright);
  color:var(--accent-bright);
  box-shadow:0 0 12px rgba(91,156,246,.15);
}

/* ── Search bar ── */
.help-forms{
  display:flex;
  flex-wrap:wrap;
  gap:.75rem;
  margin:0 0 1.25rem;
  padding:.9rem 1.1rem;
  background:rgba(13,20,36,.7);
  border:1px solid var(--line);
  border-radius:var(--radius-lg);
  backdrop-filter:blur(8px);
}
.help-forms form{display:flex;gap:.5rem;align-items:center;}
label{color:var(--muted);font-weight:500;font-size:.87rem;}
input{
  background:rgba(7,9,15,.8);
  border:1px solid var(--line);
  color:var(--text);
  padding:.45rem .75rem;
  border-radius:var(--radius-sm);
  min-width:150px;
  font-size:.88rem;
  font-family:inherit;
  transition:border-color .18s,box-shadow .18s;
  outline:none;
}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,156,246,.12);}
input::placeholder{color:var(--muted-dim);}
button{
  background:linear-gradient(135deg,var(--accent) 0%,#82c6ff 100%);
  color:#05080f;
  border:none;
  padding:.45rem .85rem;
  border-radius:var(--radius-sm);
  font-weight:600;
  font-size:.87rem;
  font-family:inherit;
  cursor:pointer;
  letter-spacing:.02em;
  transition:filter .18s,box-shadow .18s,transform .12s;
}
button:hover{filter:brightness(1.1);box-shadow:0 0 14px rgba(91,156,246,.35);}
button:active{transform:scale(.97);}

/* ── Main content ── */
main{
  background:rgba(11,16,28,.82);
  border:1px solid var(--line);
  padding:1.5rem 1.5rem;
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  backdrop-filter:blur(6px);
}

/* ── Typography ── */
h1{font-size:1.55rem;font-weight:700;color:#eef2ff;letter-spacing:-.02em;margin-bottom:.6rem;line-height:1.2;}
h2{font-size:1.15rem;font-weight:600;color:#dde5ff;letter-spacing:-.01em;margin:1.2rem 0 .5rem;line-height:1.3;}
h3{font-size:1rem;font-weight:600;color:#c8d4f8;margin:.9rem 0 .4rem;}
p,li{color:var(--text);font-size:.94rem;}
a{color:var(--accent-bright);text-decoration:none;}
a:hover{text-decoration:underline;text-underline-offset:3px;}
.muted{color:var(--muted);}

/* ── Code / pre ── */
pre{
  white-space:pre-wrap;
  background:rgba(4,6,12,.9);
  padding:1rem 1.1rem;
  border-radius:var(--radius);
  border:1px solid var(--line);
  overflow:auto;
  font-size:.86rem;
}
code{
  background:rgba(4,6,12,.8);
  border:1px solid var(--line);
  border-radius:5px;
  padding:.15em .4em;
  font-size:.88em;
}

/* ── Grid / cards ── */
ul{padding-left:1.3rem;}
ul li{margin:.25rem 0;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:.9rem;margin:.9rem 0 1.2rem;}
.card{
  background:var(--bg-card);
  border:1px solid var(--line);
  padding:1rem 1.1rem;
  border-radius:var(--radius);
  transition:border-color .2s,background .2s,box-shadow .2s;
}
.card:hover{
  border-color:var(--line-bright);
  background:var(--bg-card-hover);
  box-shadow:0 0 18px rgba(91,156,246,.08);
}

/* ── Sub-nav tabs ── */
.sub-nav{
  display:flex;
  flex-wrap:wrap;
  gap:.4rem;
  margin-bottom:1.25rem;
  padding:.6rem .9rem;
  background:rgba(7,9,15,.6);
  border:1px solid var(--line);
  border-radius:var(--radius);
}
.sub-nav a{
  padding:.35rem .8rem;
  border-radius:999px;
  text-decoration:none;
  font-weight:500;
  font-size:.87rem;
  letter-spacing:.02em;
  color:var(--muted);
  border:1px solid transparent;
  transition:background .18s,color .18s,border-color .18s;
}
.sub-nav a:hover{color:var(--accent-bright);background:var(--accent-dim);border-color:var(--line);}
.sub-nav a.active{
  background:rgba(91,156,246,.18);
  border-color:var(--line-bright);
  color:var(--accent-bright);
}

/* ── MUD client ── */
.mud-output{height:52vh;overflow:auto;font-family:ui-monospace,'SFMono-Regular',Menlo,monospace;font-size:.85rem;}
.mud-controls{display:flex;flex-wrap:wrap;gap:.55rem;margin:.75rem 0;align-items:center;}
.mud-controls select{
  background:var(--bg-soft);
  border:1px solid var(--line);
  color:var(--text);
  padding:.45rem .65rem;
  border-radius:var(--radius-sm);
  font-family:inherit;
  outline:none;
}

/* ── MUD client fullscreen ── */
body.mud-fullscreen-active main{
  backdrop-filter:none;
}
#mud-client-container.mud-fullscreen{
  position:fixed;
  top:0;left:0;
  width:100vw;height:100vh;
  z-index:9999;
  background:var(--bg);
  padding:.6rem .9rem;
  display:flex;
  flex-direction:column;
  box-sizing:border-box;
  gap:.4rem;
}
#mud-client-container.mud-fullscreen .mud-output{
  flex:1;
  height:auto;
}
#mud-client-container.mud-fullscreen #io-panel{
  flex:1;
  height:auto;
}

/* ── MUD I/O panel (main) ── */
#io-panel{
  display:flex;
  flex-direction:column;
  height:62vh;
  border:1px solid var(--line);
  border-radius:var(--radius);
  overflow:hidden;
  margin:.5rem 0;
  background:var(--bg);
}

/* ── MUD floating windows (v2 only) ── */
.float-window{
  position:fixed;
  z-index:1000;
  display:none;
  flex-direction:column;
  background:var(--bg-card);
  border:1px solid var(--line-bright);
  border-radius:var(--radius);
  box-shadow:var(--shadow-lg);
  overflow:hidden;
  min-width:180px;
  min-height:120px;
  resize:both;
}
.float-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:.25rem .55rem;
  background:rgba(13,20,36,.9);
  border-bottom:1px solid var(--line);
  cursor:move;
  user-select:none;
  flex-shrink:0;
}
.float-title{
  font-size:.72rem;
  font-weight:600;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.06em;
}
.float-close{
  background:none;
  border:1px solid transparent;
  color:var(--muted-dim);
  padding:.05rem .3rem;
  cursor:pointer;
  font-size:.75rem;
  line-height:1.4;
  border-radius:3px;
  flex-shrink:0;
}
.float-close:hover{
  color:var(--text);
  border-color:var(--line);
  background:rgba(255,95,86,.12);
  filter:none;
  box-shadow:none;
  transform:none;
}

/* ── Room panel content ── */
.room-content{
  flex:1;
  overflow-y:auto;
  padding:.45rem .55rem;
  font-size:.82rem;
  line-height:1.45;
}
.room-name{
  font-weight:700;
  color:#eef2ff;
  font-size:.88rem;
  margin-bottom:.35rem;
}
.room-desc{
  color:var(--text);
  margin-bottom:.5rem;
  white-space:pre-wrap;
  font-family:ui-monospace,'SFMono-Regular',Menlo,monospace;
  font-size:.8rem;
}
.room-exits{
  display:flex;
  flex-wrap:wrap;
  gap:.25rem;
  margin-bottom:.55rem;
}
.exit-chip{
  padding:.1rem .38rem;
  background:var(--accent-dim);
  border:1px solid var(--line);
  border-radius:4px;
  cursor:pointer;
  font-size:.74rem;
  font-weight:700;
  color:var(--accent-bright);
  transition:background .15s,border-color .15s;
  font-family:ui-monospace,monospace;
}
.exit-chip:hover{
  background:rgba(91,156,246,.22);
  border-color:var(--line-bright);
}
.room-section-title{
  font-size:.68rem;
  font-weight:600;
  color:var(--muted-dim);
  text-transform:uppercase;
  letter-spacing:.05em;
  margin:.45rem 0 .2rem;
  border-bottom:1px solid var(--line);
  padding-bottom:.12rem;
}
.entity-row{
  display:flex;
  align-items:center;
  gap:.3rem;
  padding:.12rem .15rem;
  border-radius:3px;
  position:relative;
}
.entity-row:hover{background:rgba(91,156,246,.07);}
.entity-name{
  flex:1;
  font-size:.8rem;
  color:var(--text);
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}
.entity-menu-btn{
  background:none;
  border:1px solid var(--line);
  color:var(--muted);
  padding:.05rem .3rem;
  border-radius:3px;
  font-size:.65rem;
  cursor:pointer;
  flex-shrink:0;
  line-height:1.4;
}
.entity-menu-btn:hover{
  background:var(--accent-dim);
  border-color:var(--line-bright);
  color:var(--accent-bright);
  filter:none;
  box-shadow:none;
}
.entity-dropdown{
  position:absolute;
  right:0;
  top:100%;
  background:var(--bg-card);
  border:1px solid var(--line-bright);
  border-radius:var(--radius-sm);
  z-index:200;
  min-width:120px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.entity-dropdown.hidden{display:none;}
.dropdown-item{
  display:block;
  width:100%;
  text-align:left;
  padding:.3rem .6rem;
  background:none;
  border:none;
  border-bottom:1px solid var(--line);
  color:var(--text);
  font-size:.8rem;
  cursor:pointer;
  border-radius:0;
  font-family:inherit;
}
.dropdown-item:last-child{border-bottom:none;}
.dropdown-item:hover{
  background:var(--accent-dim);
  color:var(--accent-bright);
  filter:none;
  box-shadow:none;
  transform:none;
}

/* ── Shared panel states ── */
.panel-placeholder{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--muted-dim);
  font-size:.8rem;
  text-align:center;
  padding:1rem;
  font-style:italic;
}

/* ── Map canvas ── */
#map-canvas{
  flex:1;
  width:100%;
  display:none;
}
#map-placeholder{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--muted-dim);
  font-size:.8rem;
  text-align:center;
  padding:1rem;
  font-style:italic;
}

/* ── I/O panel ── */
#io-panel .mud-output{
  flex:1;
  height:auto;
  border-radius:0;
  border:none;
  padding:.5rem .6rem;
  background:transparent;
}
.mud-input-bar{
  display:flex;
  gap:.4rem;
  padding:.35rem .5rem;
  border-top:1px solid var(--line);
  flex-shrink:0;
  background:rgba(13,20,36,.6);
}
.mud-input-bar input{flex:1;}

/* ── Connection status chip ── */
.mud-status{
  font-size:.78rem;
  color:var(--muted-dim);
  padding:.2rem .5rem;
  border-radius:999px;
  border:1px solid transparent;
}
.mud-status.connected{
  color:#27c93f;
  border-color:rgba(39,201,63,.3);
  background:rgba(39,201,63,.08);
}
.mud-status.error{
  color:#ff5f56;
  border-color:rgba(255,95,86,.3);
  background:rgba(255,95,86,.08);
}

/* ── IO message variants ── */
.io-system{color:var(--muted);font-style:italic;}
.io-tell{color:#a5f3fc;}

/* ── Equipment panel ── */
.equip-content{flex:1;overflow-y:auto;padding:.45rem .55rem;font-size:.82rem;}
/* ── Inventory panel ── */
.inv-content{flex:1;overflow-y:auto;padding:.45rem .55rem;font-size:.82rem;}
.equip-table{width:100%;border-collapse:collapse;}
.equip-slot-name{color:var(--muted);font-size:.7rem;text-transform:uppercase;padding:.15rem .4rem .15rem 0;white-space:nowrap;vertical-align:middle;}
.equip-item-name{color:var(--text);padding:.15rem 0;}
.equip-item-name[data-item-name]{cursor:help;}
.equip-item-name[data-item-name]:hover{color:var(--accent-bright);}
.equip-empty{color:var(--muted-dim);font-style:italic;}

/* ── Character sheet panel ── */
.char-content{flex:1;overflow-y:auto;padding:.45rem .55rem;font-size:.82rem;line-height:1.5;}
.char-header{font-weight:700;color:#eef2ff;font-size:.85rem;margin-bottom:.4rem;}
.char-bar-wrap{display:flex;align-items:center;gap:.35rem;margin-bottom:.2rem;}
.char-bar-label{width:1.8rem;font-size:.7rem;color:var(--muted);text-transform:uppercase;flex-shrink:0;}
.char-bar{flex:1;height:.5rem;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
.char-bar-fill{height:100%;border-radius:3px;transition:width .3s;}
.bar-hp{background:#27c93f;}.bar-mp{background:#61afef;}.bar-mv{background:#e3b341;}
.char-bar-val{font-size:.7rem;color:var(--muted);white-space:nowrap;flex-shrink:0;}
.char-stats{display:flex;flex-wrap:wrap;gap:.2rem .45rem;margin:.3rem 0;}
.char-stat{font-size:.72rem;color:var(--muted);font-family:ui-monospace,monospace;}
.char-classes{font-size:.74rem;color:var(--accent-bright);margin-bottom:.2rem;font-family:ui-monospace,monospace;}
.char-gold-exp{font-size:.72rem;color:var(--muted);margin-bottom:.15rem;}
.char-position{font-size:.72rem;color:var(--muted-dim);font-style:italic;}
.char-row{display:flex;gap:.45rem;margin:.15rem 0;align-items:baseline;}
.char-row-label{font-size:.68rem;font-weight:600;color:var(--muted-dim);text-transform:uppercase;letter-spacing:.05em;width:4.5rem;flex-shrink:0;}
.char-row-val{font-size:.72rem;color:var(--muted);font-family:ui-monospace,monospace;}

/* ── Appraise popup ── */
.appraise-popup{position:fixed;z-index:2000;background:var(--bg-card);border:1px solid var(--line-bright);border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:.4rem .6rem;font-size:.78rem;line-height:1.5;max-width:220px;pointer-events:none;}
.appraise-name{font-weight:700;color:#eef2ff;margin-bottom:.2rem;}
.appraise-type{color:var(--muted);font-size:.72rem;margin-bottom:.25rem;}
.appraise-meta{color:var(--muted-dim);font-size:.68rem;margin-top:.2rem;border-top:1px solid var(--line);padding-top:.2rem;}
</style>
</head><body>
<header class='site-brand'>
<img src='__SITE_LOGO_SRC__' alt='ACKMUD logo'>
<p>__TAGLINE__</p>
</header>
__NAV__
<main>__BODY__</main>
</body></html>
