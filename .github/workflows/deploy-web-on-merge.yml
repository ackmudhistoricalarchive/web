name: Deploy Web on Merge to Main

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'

permissions:
  contents: read
  pull-requests: read

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest code and rebuild web on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          # GitHub Actions cannot reach the web server (192.168.1.113) directly.
          # Jump through the game server (ackmud.com) using shared credentials.
          proxy_host: ${{ secrets.DEPLOY_HOST }}
          proxy_username: ${{ secrets.DEPLOY_USER }}
          proxy_key: ${{ secrets.DEPLOY_KEY }}
          host: 192.168.1.113
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}/web
            git stash
            git pull origin main
            make
            # Install/reload nginx config
            cp nginx/ackmud.conf /etc/nginx/sites-available/ackmud.conf
            ln -sf /etc/nginx/sites-available/ackmud.conf /etc/nginx/sites-enabled/ackmud.conf
            nginx -t && systemctl reload nginx
            echo "Web build complete."
